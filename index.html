<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="bplace file explorer">
        <title>bplace file explorer</title>
        <script src="app.js" type="module"></script>
        <style>
            body {
                background: #414040;
            }
            #dropTarget {
                width: 300px;
                height: 150px;
                border: 2px dashed #888;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: sans-serif;
            }

            #dropTarget.dragover {
                background-color: #f0f0f0;
                border-color: #333;
            }

            #outputImage {
                width:25%;
                image-rendering: pixelated;
            }
        </style>
    </head>
    <body>
        <div align="center">
            <div id="dropTarget">
                Drop file here
            </div>
            <div><input id="inputChooser" type="file"></div>
            <div><img id="outputImage"></div>
            <div id="output" style="display:none;">
                <table>
                    <tr>
                        <td>Version</td>
                        <td><span id="output-version"></span></td>
                    </tr>
                    <tr>
                        <td>Exported At</td>
                        <td><span id="output-exportedAt"></span></td>
                    </tr>
                    <tr>
                        <td>Name</td>
                        <td><span id="output-name"></span></td>
                    </tr>
                    <tr>
                        <td>Opacity</td>
                        <td><span id="output-opacity"></span></td>
                    </tr>
                    <tr>
                        <td>Scale</td>
                        <td><span id="output-position"></span></td>
                    </tr>
                    <tr>
                        <td>Scale</td>
                        <td><span id="output-scale"></span></td>
                    </tr>
                    <tr>
                        <td>Rotation</td>
                        <td><span id="output-rotation"></span></td>
                    </tr>
                    <tr>
                        <td>Visible</td>
                        <td><span id="output-visible"></span></td>
                    </tr>
                    <tr>
                        <td>Size</td>
                        <td><span id="output-size"></span></td>
                    </tr>
                    <tr>
                        <td>Display Mode</td>
                        <td><span id="output-displayMode"></span></td>
                    </tr>
                    <tr>
                        <td>Render Above Pixels</td>
                        <td><span id="output-renderAbovePixels"></span></td>
                    </tr>
                    <tr>
                        <td>Exclude Special Colors</td>
                        <td><span id="output-excludeSpecialColors"></span></td>
                    </tr>
                    <tr>
                        <td>Canvas Type</td>
                        <td><span id="output-canvasType"></span></td>
                    </tr>
                    <tr>
                        <td>Image in IndexedDB</td>
                        <td><span id="output-imageInIndexedDB"></span></td>
                    </tr>
                    <tr>
                        <td>Image Data</td>
                        <td><button id="imageDataCopyButton">Copy Image Data</button></td>
                    </tr>
                    <tr>
                        <td>Needs Image Load</td>
                        <td><span id="output-_needsImageLoad"></span></td>
                    </tr>
                    <tr>
                        <td>Version</td>
                        <td><span id="output-_version"></span></td>
                    </tr>
                </table>
            </div>
        </div>
    </body>
</html>
